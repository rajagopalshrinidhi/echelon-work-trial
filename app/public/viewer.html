<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Viewer — Echelon Publish</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { display: flex; flex-direction: column; height: 100vh; font-family: system-ui, sans-serif; background: #f5f5f5; }

    .topbar {
      display: flex; align-items: center; gap: 1rem;
      padding: 0.6rem 1rem; background: #1a1a1a; color: #fff;
      font-size: 0.85rem; flex-shrink: 0;
    }
    .topbar a { color: #aaa; text-decoration: none; }
    .topbar a:hover { color: #fff; }
    .topbar .site-name { font-weight: 600; color: #fff; flex: 1; }
    .open-link { font-size: 0.8rem; color: #aaa; text-decoration: none; }
    .open-link:hover { color: #fff; }

    iframe { flex: 1; border: none; width: 100%; background: #fff; }

    .bottombar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.65rem 1rem; background: #fff; border-top: 1px solid #ddd;
      flex-shrink: 0;
    }
    .save-status { font-size: 0.8rem; color: #999; }
    .save-status.unsaved { color: #c08000; }
    .save-status.saving  { color: #888; }
    .save-status.saved   { color: #1a7a1a; }

    .identity-btn {
      font-size: 0.8rem; color: #555; background: none; border: 1px solid #ddd;
      border-radius: 4px; padding: 0.2rem 0.5rem; cursor: pointer; white-space: nowrap;
    }
    .identity-btn:hover { border-color: #aaa; color: #222; background: #f5f5f5; }
  </style>
</head>
<body>
  <div class="topbar">
    <a href="/">← Admin</a>
    <span class="site-name" id="site-name-label"></span>
    <a class="open-link" id="open-link" target="_blank">Open in new tab ↗</a>
  </div>

  <iframe id="viewer-frame"></iframe>

  <div class="bottombar">
    <span class="save-status" id="save-status"></span>
    <button class="identity-btn" id="identity-btn" onclick="promptName()"></button>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const site = params.get('site');

    if (!site) {
      document.body.innerHTML = '<p style="padding:2rem;font-family:system-ui">No site specified. <a href="/">Go back</a></p>';
      throw new Error('no site');
    }

    document.title = site + ' — Echelon Publish';
    document.getElementById('site-name-label').textContent = site;
    document.getElementById('open-link').href = '/' + site + '/';

    // --- User identity (mirrors SDK logic; viewer is not a published page so SDK isn't injected) ---
    function getOrCreateId() {
      let id = localStorage.getItem('echelon_user_id');
      if (!id) {
        id = typeof crypto.randomUUID === 'function'
          ? crypto.randomUUID()
          : Date.now().toString(36) + Math.random().toString(36).slice(2);
        localStorage.setItem('echelon_user_id', id);
      }
      return id;
    }
    const userId = getOrCreateId();
    let userName = localStorage.getItem('echelon_user_name') || '';

    function renderIdentityBtn() {
      document.getElementById('identity-btn').textContent =
        userName ? ('You: ' + userName) : 'You: Anonymous · Set name';
    }
    renderIdentityBtn();

    function promptName() {
      const name = prompt('Your display name (shown to site admins):', userName);
      if (name === null) return;
      userName = name.trim();
      localStorage.setItem('echelon_user_name', userName);
      renderIdentityBtn();
    }

    // --- Init: fetch site mode, then load iframe ---
    const frame = document.getElementById('viewer-frame');
    const saveStatus = document.getElementById('save-status');
    let saveTimer = null;
    let stateUrl = null;

    async function init() {
      let isIndividual = false;
      try {
        const info = await fetch('/_api/sites/' + encodeURIComponent(site)).then(r => r.json());
        isIndividual = info.mode === 'individual';
      } catch (_) {}

      stateUrl = isIndividual
        ? '/_api/state/' + encodeURIComponent(site) + '?user=' + encodeURIComponent(userId)
        : '/_api/state/' + encodeURIComponent(site);

      frame.src = '/' + site + '/';
    }

    init();

    frame.addEventListener('load', async () => {
      const doc = frame.contentDocument;
      if (!doc) return;

      try {
        const state = await fetch(stateUrl).then(r => r.json());
        if (Object.keys(state).length > 0) {
          applyState(doc, state);
          setStatus('saved', 'Restored saved state');
          setTimeout(() => setStatus('', ''), 2000);
        }
      } catch (_) {}

      doc.addEventListener('input', onFieldChange);
      doc.addEventListener('change', onFieldChange);
    });

    function onFieldChange(e) {
      if (!['INPUT', 'TEXTAREA', 'SELECT'].includes(e.target.tagName)) return;
      setStatus('unsaved', 'Unsaved changes');
      clearTimeout(saveTimer);
      saveTimer = setTimeout(doSave, 1500);
    }

    async function doSave() {
      const doc = frame.contentDocument;
      if (!doc) return;
      setStatus('saving', 'Saving…');
      try {
        await fetch(stateUrl, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(captureState(doc))
        });
        setStatus('saved', 'Saved');
      } catch (_) {
        setStatus('unsaved', 'Save failed');
      }
    }

    function captureState(doc) {
      const state = {};
      doc.querySelectorAll('input, textarea, select').forEach((el, i) => {
        const key = el.name || el.id || '_f' + i;
        if (el.type === 'checkbox' || el.type === 'radio') {
          state[key] = el.checked;
        } else {
          state[key] = el.value;
        }
      });
      return state;
    }

    function applyState(doc, state) {
      doc.querySelectorAll('input, textarea, select').forEach((el, i) => {
        if (el.type === 'file') return;
        const key = el.name || el.id || '_f' + i;
        if (!(key in state)) return;
        if (el.type === 'checkbox' || el.type === 'radio') {
          el.checked = state[key];
        } else {
          el.value = state[key];
        }
      });
    }

    function setStatus(cls, text) {
      saveStatus.textContent = text;
      saveStatus.className = 'save-status' + (cls ? ' ' + cls : '');
    }
  </script>
</body>
</html>
